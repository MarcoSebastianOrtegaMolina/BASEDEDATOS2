<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Alumnos | Modo MC</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <script src="./app.js"></script>
    <style>
        :root {
            --mc-green: #3C8527;
            --mc-green-hover: #52B538;
            --mc-gray: #8B8B8B;
            --mc-dark: #1E1E1E;
            --mc-border: #000000;
        }

        body {
            /* Fondo simulando textura de piedra oscura/menú */
            background-color: #212121;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a), 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            color: white;
            font-family: 'VT323', monospace;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .contenedor {
            background: rgba(30, 30, 30, 0.95);
            padding: 30px;
            border: 4px solid var(--mc-border);
            box-shadow: inset 2px 2px 0px 0px rgba(255,255,255,0.2), 
                        10px 10px 0px 0px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 850px;
            image-rendering: pixelated;
        }

        h2 {
            font-family: 'Press Start 2P', cursive;
            color: #FFFFFF;
            text-shadow: 3px 3px 0px #3F3F3F;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-align: center;
            line-height: 1.4;
        }

        .controles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            align-items: end;
            margin-bottom: 30px;
        }

        .grupo-control {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #AAAAAA;
            text-shadow: 1px 1px 0px #000;
        }

        input, select {
            background-color: #000;
            color: #FFF;
            padding: 12px;
            border: 2px solid #555;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            outline: none;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.8);
        }

        input:focus, select:focus {
            border-color: var(--mc-green);
        }

        .grupo-botones-rapidos {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--mc-gray);
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            border: 2px solid var(--mc-border);
            padding: 12px 15px;
            cursor: pointer;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.4), 
                        inset 3px 3px 0px rgba(255,255,255,0.4);
            text-shadow: 2px 2px 0px #3F3F3F;
            transition: transform 0.1s;
        }

        button:active {
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.4), 
                        inset -3px -3px 0px rgba(255,255,255,0.1);
            transform: translateY(2px);
        }

        .btn-accion {
            background-color: var(--mc-green);
            font-size: 0.8rem;
        }

        .btn-accion:hover {
            background-color: var(--mc-green-hover);
        }

        .acciones-finales {
            display: flex;
            gap: 15px;
            grid-column: 1 / -1;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 25px;
            border-top: 4px dashed #333;
        }

        .salida-datos {
            background: #000;
            color: #55FF55; /* Color verde de consola retro */
            padding: 20px;
            border: 4px solid var(--mc-border);
            font-family: 'VT323', monospace;
            overflow-x: auto;
            min-height: 250px;
            max-height: 450px;
            overflow-y: auto;
            font-size: 1.2rem;
            line-height: 1.4;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>GENERADOR DE ESTUDIANTES</h2>
        
        <div class="controles">
            <div class="grupo-control">
                <label for="numRegistros">CANTIDAD DE REGISTROS:</label>
                <input type="number" id="numRegistros" value="1" min="1" max="50000">
            </div>
            
            <div class="grupo-control">
                <label>ACCESOS RÁPIDOS:</label>
                <div class="grupo-botones-rapidos">
                    <button onclick="document.getElementById('numRegistros').value=1;">x1</button>
                    <button onclick="document.getElementById('numRegistros').value=100;">x100</button>
                    <button onclick="document.getElementById('numRegistros').value=50000;">x50k</button>
                </div>
            </div>
            
            <div class="grupo-control">
                <label for="formatoSalida">FORMATO:</label>
                <select id="formatoSalida">
                    <option value="sql">SQL (MySQL)</option>
                    <option value="postgres">PostgreSQL</option>
                    <option value="csv">CSV</option>
                    <option value="json">JSON</option>
                </select>
            </div>

            <div class="acciones-finales">
                <button onclick="iniciarCreacion()" class="btn-accion">CRAFTEAR CÓDIGO</button>
                <button onclick="descargarArchivo()" class="btn-accion">GUARDAR ARCHIVO</button>
            </div>
        </div>

        <div class="salida-datos" id="areaResultado">> Esperando comandos para generar el loot...</div>
    </div>
</body>
</html>
